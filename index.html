<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burmese Imposter - Voting System</title>
    <style>
        :root {
            --primary: #00f2fe; --secondary: #4facfe; --accent: #f093fb;
            --danger: #ff416c; --bg: #0f172a; --card-bg: #1e293b;
        }
        body { font-family: sans-serif; background-color: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 480px; text-align: center; }
        .box { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid #334155; margin-bottom: 20px; }
        input, select { background: #0f172a; border: 1px solid var(--secondary); color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
        button { background: linear-gradient(45deg, var(--secondary), var(--primary)); color: #0f172a; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .player-tag { background: #334155; padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .card { background: var(--card-bg); border: 2px dashed var(--secondary); border-radius: 20px; padding: 40px 20px; margin: 20px 0; cursor: pointer; min-height: 100px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .hidden { display: none; }
        .timer { font-size: 2rem; color: var(--accent); margin: 10px 0; font-weight: bold; }
        .vote-btn { background: #334155; margin-top: 5px; color: white; border: 1px solid var(--accent); }
        .vote-btn:hover { background: var(--accent); color: #0f172a; }
        .remove-btn { color: var(--danger); cursor: pointer; padding: 0 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--primary);">လူလိမ် ရှာတမ်း</h1>

    <div id="setup-screen" class="box">
        <label>ကစားသမား အမည်</label>
        <input type="text" id="nameInput" value="Player 1" onclick="this.select()">
        <button onclick="addPlayer()">Add Player</button>
        <div id="playerList" style="margin: 15px 0;"></div>

        <div style="text-align: left; margin: 15px 0;">
            <input type="checkbox" id="hintToggle" style="width: auto;"> Hint (Category) ပြမည် <br>
            <input type="checkbox" id="timerToggle" style="width: auto;" onchange="document.getElementById('timerSet').classList.toggle('hidden')"> Timer ထည့်မည်
            <div id="timerSet" class="hidden">
                <input type="number" id="timeLimit" value="3" style="margin-top: 10px;"> (မိနစ်)
            </div>
        </div>
        <button onclick="startGame()" style="background: var(--accent); color: white;">ဂိမ်းစတင်မယ် 🚀</button>
    </div>

    <div id="reveal-screen" class="box hidden">
        <h3 id="turn-display"></h3>
        <p id="category-hint" class="hidden" style="color: var(--accent); font-weight: bold;"></p>
        <div class="card" id="mainCard" onclick="revealWord()">
            <span id="word-text">ကြည့်ရန် နှိပ်ပါ</span>
        </div>
        <button id="nextBtn" class="hidden" onclick="nextPlayer()">နောက်တစ်ယောက်</button>
    </div>

    <div id="discuss-screen" class="box hidden">
        <h2>စကားပြောချိန်</h2>
        <div id="timerDisplay" class="timer"></div>
        <button onclick="initVoting()" style="background: var(--danger); color: white;">Voting စတင်မယ်</button>
    </div>

    <div id="vote-screen" class="box hidden">
        <h3 id="voter-name" style="color: var(--primary);"></h3>
        <p>ဘယ်သူ့ကို မဲပေးမလဲ?</p>
        <div id="voteOptions"></div>
    </div>

    <div id="result-screen" class="box hidden">
        <h2 id="result-status"></h2>
        <p id="kicked-reveal"></p>
        <hr style="border: 0.5px solid #334155; margin: 20px 0;">
        <div id="secret-word-box" class="hidden">
            စကားဝှက်မှာ: <b id="final-word" style="color: var(--primary);"></b> <br>
            လူလိမ်မှာ: <b id="real-imposter-name" style="color: var(--danger);"></b>
        </div>
        <button id="showSecretBtn" onclick="document.getElementById('secret-word-box').classList.remove('hidden'); this.style.display='none';">စကားဝှက်ကို ကြည့်ရန်</button>
        <button onclick="location.reload()" style="background: #334155; color: white; margin-top: 10px;">ဂိမ်းအသစ် ပြန်ဆော့မယ်</button>
    </div>

    <div style="font-size: 0.9rem; color: #64748b; margin-top: 20px;">
        Powered by <a href="https://nayamyanmar.com" target="_blank" style="color: var(--accent);">Naya Tech</a>
</div>

<script>
const wordBank = {
            food: [
                "မုန့်ဟင်းခါး", "လက်ဖက်သုပ်", "ကြက်သားဟင်း", "ဒူးရင်းသီး", "ပလာတာ",
                "နို့ထမင်း", "အုန်းနို့ခေါက်ဆွဲ", "ရှမ်းခေါက်ဆွဲ", "ထမင်းသုပ်", "ဝက်သားတုတ်ထိုး",
                "ကော်ပြန့်ကျော်", "မုန့်လင်မယား", "ရွှေရင်အေး", "ငါးထမင်းနယ်", "ကရင်တာလပေါဟင်း"
            ],
            places: [
                "ရွှေတိဂုံဘုရား", "ပုဂံ", "အင်းလေးကန်", "ပြင်ဦးလွင်", "ငပလီ",
                "မန္တလေးကျုံး", "ကျိုက်ထီးရိုး", "ချောင်းသာ", "ပုပ္ပားတောင်",
                "အင်းလျားကန်", "မဟာမြတ်မုနိ", "ကန်တော်ကြီး", 
            ],
            animals: [
                "ဆင်", "ကျား", "ခြင်္သေ့", "ဒေါင်း", "ယုန်", "ကြောင်", "မျောက်",
                "ခွေး", "နွား", "မြင်း", "ဝက်", "ကြက်", "ဘဲ", "ငါး", "လိပ်ပြာ",
                "ပုစဉ်း", "ပင့်ကူ", "မြွေ", "မိကျောင်း", "သစ်ကုလားအုတ်"
            ],
            jobs: [
                "ဆရာဝန်", "အင်ဂျင်နီယာ", "စစ်သား", "ရဲ", "ကျောင်းဆရာ",
                "ဈေးသည်", "လယ်သမား", "မင်းသား", "အဆိုတော်", "ပန်းချီဆရာ",
                "ဓာတ်ပုံဆရာ", "စာရေးဆရာ", "ရှေ့နေ", "စားဖိုမှူး", "ယာဉ်မောင်း"
            ],
            items: [
                "လက်ကိုင်ဖုန်း", "လက်ပ်တော့", "တီဗွီ", "ရေခဲသေတ္တာ", "စက်ဘီး",
                "မော်တော်ကား", "ထီး", "ဖိနပ်", "မျက်မှန်", "နာရီ",
                "ပုဆိုး", "ထဘီ", "ကျောပိုးအိတ်", "ရေဘူး", "ပန်ကာ"
            ]
        };

    let players = JSON.parse(localStorage.getItem('gamePlayers')) || [];
    let imposterIndex, currentIndex, secretWord, gameCategory, timerInterval;
    let voterIndex = 0, voteCounts = {};

    if(players.length > 0) renderPlayers();

    function addPlayer() {
        const input = document.getElementById('nameInput');
        players.push(input.value);
        localStorage.setItem('gamePlayers', JSON.stringify(players));
        input.value = "Player " + (players.length + 1);
        input.select();
        renderPlayers();
    }

    function renderPlayers() {
        document.getElementById('playerList').innerHTML = players.map((p, i) => `
            <div class="player-tag"><span>${i+1}. ${p}</span><span class="remove-btn" onclick="removePlayer(${i})">✕</span></div>
        `).join('');
    }

    function removePlayer(i) {
        players.splice(i, 1);
        localStorage.setItem('gamePlayers', JSON.stringify(players));
        renderPlayers();
    }

    function startGame() {
        if (players.length < 3) return alert("အနည်းဆုံး ၃ ယောက် လိုအပ်ပါတယ်");
        const cats = Object.keys(wordBank);
        gameCategory = cats[Math.floor(Math.random() * cats.length)];
        secretWord = wordBank[gameCategory][Math.floor(Math.random() * wordBank[gameCategory].length)];
        imposterIndex = Math.floor(Math.random() * players.length);
        currentIndex = 0;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('reveal-screen').classList.remove('hidden');
        showTurn();
    }

    function showTurn() {
        document.getElementById('turn-display').innerText = `${players[currentIndex]} ရဲ့ အလှည့်`;
        document.getElementById('word-text').innerText = "ကြည့်ရန် နှိပ်ပါ";
        document.getElementById('word-text').style.color = "white";
        document.getElementById('nextBtn').classList.add('hidden');
        if (document.getElementById('hintToggle').checked) {
            const hint = document.getElementById('category-hint');
            hint.innerText = `Hint: ${gameCategory}`;
            hint.classList.remove('hidden');
        } else {
            document.getElementById('category-hint').classList.add('hidden');
        }
    }

    function revealWord() {
        const text = document.getElementById('word-text');
        if (currentIndex === imposterIndex) {
            text.innerText = "သင်က လူလိမ်ပါ! 😈";
            text.style.color = "var(--danger)";
        } else {
            text.innerText = secretWord;
            text.style.color = "var(--primary)";
        }
        document.getElementById('nextBtn').classList.remove('hidden');
    }

    function nextPlayer() {
        if (++currentIndex < players.length) showTurn();
        else startDiscussion();
    }

    function startDiscussion() {
        document.getElementById('reveal-screen').classList.add('hidden');
        document.getElementById('discuss-screen').classList.remove('hidden');
        if (document.getElementById('timerToggle').checked) {
            let time = parseInt(document.getElementById('timeLimit').value) * 60;
            timerInterval = setInterval(() => {
                let m = Math.floor(time/60), s = time%60;
                document.getElementById('timerDisplay').innerText = `${m}:${s<10?'0':s}`;
                if (--time < 0) { clearInterval(timerInterval); alert("အချိန်စေ့ပါပြီ!"); }
            }, 1000);
        }
    }

    function initVoting() {
        clearInterval(timerInterval);
        voterIndex = 0;
        voteCounts = {};
        players.forEach((_, i) => voteCounts[i] = 0);
        document.getElementById('discuss-screen').classList.add('hidden');
        document.getElementById('vote-screen').classList.remove('hidden');
        showNextVoter();
    }

    function showNextVoter() {
        if (voterIndex < players.length) {
            document.getElementById('voter-name').innerText = `${players[voterIndex]} မဲပေးရန်`;
            const options = document.getElementById('voteOptions');
            options.innerHTML = players.map((p, i) => 
                i !== voterIndex ? `<button class="vote-btn" onclick="castVote(${i})">${p}</button>` : ''
            ).join('');
        } else {
            calculateResult();
        }
    }

    function castVote(i) {
        voteCounts[i]++;
        voterIndex++;
        showNextVoter();
    }

    function calculateResult() {
        document.getElementById('vote-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        let maxVotes = -1, kickedIndex = -1;
        for (let i in voteCounts) {
            if (voteCounts[i] > maxVotes) { maxVotes = voteCounts[i]; kickedIndex = parseInt(i); }
        }

        const status = document.getElementById('result-status');
        const reveal = document.getElementById('kicked-reveal');
        
        if (kickedIndex === imposterIndex) {
            status.innerText = "Imposter ကို မိသွားပါပြီ! 🏳️";
            status.style.color = "var(--primary)";
            reveal.innerHTML = `<b>${players[kickedIndex]}</b> သည် လူလိမ် (Imposter) ဖြစ်ပါသည်။`;
        } else {
            status.innerText = "လူလိမ် မဟုတ်ပါ! 🏆";
            status.style.color = "var(--danger)";
            reveal.innerHTML = `<b>${players[kickedIndex]}</b> သည် လူရိုး (Villager) သာ ဖြစ်ပါသည်။`;
        }
        
        document.getElementById('final-word').innerText = secretWord;
        document.getElementById('real-imposter-name').innerText = players[imposterIndex];
    }
</script>
</body>
</html>
